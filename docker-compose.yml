services:
  arbiter:
    image: node:20-bookworm
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @pactnet/arbiter dev"
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      ARBITER_PORT: 3001
      DB_PATH: /data/pactnet.db
    volumes:
      - ./:/app
      - sqlite-data:/data

volumes:
  sqlite-data:
